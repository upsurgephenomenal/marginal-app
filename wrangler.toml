name = "marginal-app"
main = "src/index.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"
binding = "ASSETS"

# Production bindings below are also configurable in the dashboard
# (your Worker project > Bindings tab), which is the easier path if
# you're not using the Wrangler CLI. This file mainly matters if you
# run the app locally with `wrangler dev`.
[[kv_namespaces]]
binding = "MARGINAL_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[ai]
binding = "AI"
